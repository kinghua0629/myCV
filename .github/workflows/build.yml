# With some help from: https://gist.github.com/dgerosa/2e1f47a39180f39bde848e38243efa94

name: build
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Edit here with the names of your latex file and directory (can use ".")
      DIR: .
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - name: cv
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            cv.tex
            cv-1.tex
          texlive_version: 2026
          working_directory: ${{ env.DIR }}
          latexmk_use_xelatex: true
      - name: move
        run: mkdir -p github_artifacts && mv ${{ env.DIR }}/cv.pdf ./github_artifacts/ && mv ${{ env.DIR }}/cv-1.pdf ./github_artifacts/
      - name: Upload pdf as artifact
        uses: actions/upload-artifact@v7
        with:
          path: ./github_artifacts/
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: github_artifacts
      - name: move
        run: mkdir -p github_deploy && mv github_artifacts/*/* github_deploy
      - name: deploy on orphan branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./github_deploy
          publish_branch: build
          force_orphan: true
          enable_jekyll: true
  copy-index-to-build:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Copy To Branches Action
        uses: planetoftheweb/copy-to-branches@v1.3
        env:
          key: main
          files: index.html CNAME
